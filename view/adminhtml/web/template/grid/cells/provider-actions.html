<!--
    Inline Edit | Delete links for the OIDC Provider grid actions column.
    $col  = the JS column component (provider-actions.js)
    $row  = KO observable returning the current row data object
-->
<span class="data-grid-cell-content" style="white-space:nowrap">
    <a data-bind="attr: {href: $col.getEditUrl($row())}, text: $t('Edit')"></a>
    <span> | </span>
    <a href="#"
       data-bind="click: $col.deleteRow.bind($col, $row()),
                  text: $t('Delete')"></a>
</span>
